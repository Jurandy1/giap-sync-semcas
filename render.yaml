# Força o Render a usar Docker (imagem oficial do Puppeteer com Chrome).
# Sem isso, o deploy Node nativo sobe sem o Chrome e o job falha.
# Plano free = 512MB — lotes curtos + restart frequente do Chrome.
services:
  - type: web
    name: giap-sync-semcas
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PUPPETEER_DOCKER
        value: "1"
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=160 --expose-gc"
      - key: GIAP_MAX_BUSCAS_NOME
        value: "8"
      - key: GIAP_MAX_VARIANTES_NOME
        value: "1"
      - key: GIAP_BROWSER_RESTART_EVERY
        value: "3"
      - key: GIAP_CLOSE_BROWSER_EVERY_NOME
        value: "2"
      # API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY: cadastre no Dashboard
